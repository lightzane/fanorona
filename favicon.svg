<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <radialGradient id="fav-ws" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e5dcc5"/>
      <stop offset="68%"  stop-color="#f3ece0"/>
      <stop offset="85%"  stop-color="#c4b9a3"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </radialGradient>

    <radialGradient id="fav-bs" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#4a3b30"/>
      <stop offset="68%"  stop-color="#2c241d"/>
      <stop offset="85%"  stop-color="#050302"/>
      <stop offset="100%" stop-color="#7a7065"/>
    </radialGradient>

    <linearGradient id="fav-wss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="15%"  stop-color="#ffffff"/>
      <stop offset="25%"  stop-color="#e5dcc5"/>
      <stop offset="75%"  stop-color="#e5dcc5"/>
      <stop offset="85%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>

    <linearGradient id="fav-bss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5c5252"/>
      <stop offset="15%"  stop-color="#5c5252"/>
      <stop offset="25%"  stop-color="white" stop-opacity="0.25"/>
      <stop offset="75%"  stop-color="white" stop-opacity="0.25"/>
      <stop offset="85%"  stop-color="#5c5252"/>
      <stop offset="100%" stop-color="#5c5252"/>
    </linearGradient>

    <filter id="fav-shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#0c0a09" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="32" height="32" rx="6" fill="#f5deb3"/>

  <g stroke="#b8860b" stroke-opacity="0.7" stroke-width="0.9" stroke-linecap="round">
    <line x1="4"  y1="4"  x2="28" y2="4"/>
    <line x1="4"  y1="16" x2="28" y2="16"/>
    <line x1="4"  y1="28" x2="28" y2="28"/>
    <line x1="4"  y1="4"  x2="4"  y2="28"/>
    <line x1="16" y1="4"  x2="16" y2="28"/>
    <line x1="28" y1="4"  x2="28" y2="28"/>
    <line x1="4"  y1="4"  x2="28" y2="28"/>
    <line x1="28" y1="4"  x2="4"  y2="28"/>
    <line x1="4"  y1="16" x2="16" y2="4"/>
    <line x1="16" y1="4"  x2="28" y2="16"/>
    <line x1="28" y1="16" x2="16" y2="28"/>
    <line x1="16" y1="28" x2="4"  y2="16"/>
  </g>

  <g filter="url(#fav-shadow)">
    <circle cx="10" cy="10" r="7" fill="url(#fav-ws)" stroke="#8a7d65" stroke-width="0.5"/>
    <circle cx="10" cy="10" r="5.75" fill="none" stroke="url(#fav-wss)" stroke-width="0.3"/>
  </g>

  <g filter="url(#fav-shadow)">
    <circle cx="22" cy="22" r="7" fill="url(#fav-bs)" stroke="#000000" stroke-width="0.5"/>
    <circle cx="22" cy="22" r="5.75" fill="none" stroke="url(#fav-bss)" stroke-width="0.7"/>
  </g>
</svg>
